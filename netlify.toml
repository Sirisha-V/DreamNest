[build]
  base = "."
  command = "npm install && cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  VITE_API_URL = "/api"

[functions]
  directory = "netlify/functions"
  included_files = ["backend/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
